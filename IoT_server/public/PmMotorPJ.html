     <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
     <script>var $j331 = jQuery.noConflict(true);</script>
     <script>
          var socket = io.connect();
           var timer = null;
           var currentPm = -1; // 이전 미세먼지 수치 저장용
           var windowState = 'closed'; // 아두이노 초기 상태가 CLOSED(0도)이므로 웹페이지도 closed로 일치시킵니다.
           var hasPromptedWarning = false;  // 80 이상 경고창을 띄웠는지 여부
           var hasPromptedRecovery = false; // 70 이하 환기창을 띄웠는지 여부

          $j331(document).ready(function () {
               socket.on("socket_up_temp", function (data) {
                    data = JSON.parse(data);
                    $j331(".temp").html(data.tmp);
               });
               socket.on("socket_up_humi", function (data) {
                    data = JSON.parse(data);
                    $j331(".humi").html(data.humi);
               });
                socket.on("socket_up_pm", function (data) {
                     data = JSON.parse(data);
                     var newPm = parseInt(data.pm);
                     $j331(".pm").html(newPm);

                     if (currentPm === -1) {
                          currentPm = newPm;
                          return;
                     }

                     // 1. 100 초과(이상): 자동으로 닫음
                     if (newPm >= 100) {
                          if (windowState === 'open') {
                               windowState = 'closed';
                               alert("🚨 미세먼지가 " + newPm + "으로 매우 나쁩니다!\n창문을 자동으로 닫습니다.");
                               alert("🍃 공기청정기를 켭니다."); // 공기청정기 알림 추가
                               socket.emit("manual_control", { command: "auto_close" });
                          }
                     }
                     // 2. 80 초과(이상) 100 미만: 사용자에게 닫을지 묻기
                     else if (newPm > 80) {
                          if (windowState === 'open' && !hasPromptedWarning && currentPm <= 80) {
                               hasPromptedWarning = true;
                               if (confirm("⚠️ 미세먼지가 " + newPm + "으로 나빠지고 있습니다!\n창문을 닫으시겠습니까?")) {
                                    windowState = 'closed';
                                    alert("🍃 공기청정기를 켭니다."); // 공기청정기 알림 추가
                                    socket.emit("manual_control", { command: "manual_close" });
                               }
                          }
                     }
                     // 3. 70 이하: 사용자에게 열지 묻기
                     else if (newPm <= 70) {
                          if (windowState === 'closed' && !hasPromptedRecovery && currentPm > 70) {
                               hasPromptedRecovery = true;
                               if (confirm("🍃 미세먼지가 " + newPm + "으로 떨어져 공기가 좋아졌습니다!\n창문을 다시 열어 환기하시겠습니까?")) {
                                    windowState = 'open';
                                    socket.emit("manual_control", { command: "manual_open" });
                               }
                          }
                     }

                     // 경고창 중복 방지 플래그 리셋 조건
                     if (newPm <= 80) {
                          hasPromptedWarning = false; // 80 이하로 떨어지면 다시 80 초과가 되었을 때 경고창을 띄우도록 리셋
                     }
                     if (newPm > 70) {
                          hasPromptedRecovery = false; // 70 초과로 올라가면 다시 70 이하가 되었을 때 환기창을 띄우도록 리셋
                     }

                     currentPm = newPm;
                });

               // 모드 변경 이벤트
               $j331('input[name="controlMode"]').change(function () {
                    var mode = $j331(this).val();
                    socket.emit('change_mode', { mode: mode });

                    if (mode === 'simulation') {
                         $j331('#simulation-controls').css({ 'opacity': '1', 'pointer-events': 'auto' });
                    } else {
                         $j331('#simulation-controls').css({ 'opacity': '0.3', 'pointer-events': 'none' });
                    }
               });

               // 슬라이더 이벤트
               $j331("#pm-slider").on("input", function () {
                    $j331("#pm-slider-val").text($j331(this).val());
               });
               $j331("#pm-slider").on("change", function () {
                    socket.emit("virtual_pm", { pm: $j331(this).val() });
               });

               // 버튼 제어 이벤트
               $j331("#btn-open").click(function () {
                    socket.emit("manual_control", { command: "manual_open" });
                    windowState = 'open';
               });
               $j331("#btn-close").click(function () {
                    socket.emit("manual_control", { command: "manual_close" });
                    windowState = 'closed';
               });

               if (timer == null) {
                    timer = window.setInterval("timer_1()", 3000);
               }
          });
          function timer_1() {
               socket.emit("socket_evt_update", JSON.stringify({}));
          }
     </script>
